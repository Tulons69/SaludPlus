spring:
  application:
    name: paciente-service

  datasource:
    url: jdbc:mysql://localhost:3306/db_pacientes?rewriteBatchedStatements=true&useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

server:
  port: 8080

# Backup configuracion
backup:
  mysql:
    dump-path: C:/laragon/bin/mysql/mysql-8.0.30-winx64/bin/mysqldump
    db-name: db_pacientes
    db-user: root
    db-pass:
    save-path: C:/backups/backup_pacientes.sql

# URL del microservicio Doctor (para Feign)
doctor:
  service:
    url: http://localhost:8081

# Swagger / OpenAPI
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html
