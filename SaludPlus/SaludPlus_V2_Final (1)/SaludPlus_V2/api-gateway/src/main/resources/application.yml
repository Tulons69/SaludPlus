server:
  port: 8085

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # ── Ruta 1: paciente-service ──────────────────────────────────────
        # Todo lo que llegue a /gateway/pacientes/** se redirige a localhost:8080
        - id: paciente-service
          uri: http://localhost:8080
          predicates:
            - Path=/gateway/pacientes/**
          filters:
            - RewritePath=/gateway/pacientes/(?<segment>.*), /api/v1/pacientes/$\{segment}

        # ── Ruta 2: paciente-service HATEOAS v2 ──────────────────────────
        - id: paciente-service-v2
          uri: http://localhost:8080
          predicates:
            - Path=/gateway/v2/pacientes/**
          filters:
            - RewritePath=/gateway/v2/pacientes/(?<segment>.*), /api/v2/pacientes/$\{segment}

        # ── Ruta 3: doctor-service ────────────────────────────────────────
        # Todo lo que llegue a /gateway/doctores/** se redirige a localhost:8081
        - id: doctor-service
          uri: http://localhost:8081
          predicates:
            - Path=/gateway/doctores/**
          filters:
            - RewritePath=/gateway/doctores/(?<segment>.*), /api/v1/doctores/$\{segment}

        # ── Ruta 4: doctor-service HATEOAS v2 ────────────────────────────
        - id: doctor-service-v2
          uri: http://localhost:8081
          predicates:
            - Path=/gateway/v2/doctores/**
          filters:
            - RewritePath=/gateway/v2/doctores/(?<segment>.*), /api/v2/doctores/$\{segment}

        # ── Ruta 5: tester paciente-service ──────────────────────────────
        - id: tester-paciente
          uri: http://localhost:8080
          predicates:
            - Path=/gateway/tester/paciente/**
          filters:
            - RewritePath=/gateway/tester/paciente/(?<segment>.*), /api/tester/$\{segment}

        # ── Ruta 6: tester doctor-service ────────────────────────────────
        - id: tester-doctor
          uri: http://localhost:8081
          predicates:
            - Path=/gateway/tester/doctor/**
          filters:
            - RewritePath=/gateway/tester/doctor/(?<segment>.*), /api/tester/$\{segment}

# Actuator - permite ver rutas del gateway en /actuator/gateway/routes
management:
  endpoints:
    web:
      exposure:
        include: gateway, health, info
  endpoint:
    gateway:
      enabled: true
