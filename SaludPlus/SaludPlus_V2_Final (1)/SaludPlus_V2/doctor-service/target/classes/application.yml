spring:
  application:
    name: doctor-service

  datasource:
    url: jdbc:mysql://localhost:3306/db_doctores?useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

server:
  port: 8081

backup:
  mysql:
    dump-path: C:/laragon/bin/mysql/mysql-8.0.30-winx64/bin/mysqldump
    db-name: db_doctores
    db-user: root
    db-pass:
    save-path: C:/backups/backup_doctores.sql

paciente:
  service:
    url: http://localhost:8080

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html
