spring.application.name=doctor-service

# Puerto del microservicio Doctor
server.port=8081

# Conexion MySQL Laragon - Base de datos exclusiva de doctores
spring.datasource.url=jdbc:mysql://localhost:3306/db_doctores?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate - Flyway controla el esquema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway - Migraciones
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Backup - Configuracion
backup.mysql.dump-path=C:/laragon/bin/mysql/mysql-8.0.30-winx64/bin/mysqldump
backup.mysql.db-name=db_doctores
backup.mysql.db-user=root
backup.mysql.db-pass=
backup.mysql.save-path=C:/backups/backup_doctores.sql

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
